name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update versions
        run: |
          node scripts/sync-release-version.mjs --version ${{ github.event.inputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json apps/*/package.json packages/*/package.json
          git commit -m "release: v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main --tags

  build:
    needs: release
    runs-on: macos-13
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ github.event.inputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build desktop release
        run: npm run build -w desktop

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "Release v$VERSION" \
            --generate-notes \
            || echo "Release may already exist"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v${{ github.event.inputs.version }}
        run: |
          gh release upload "$TAG_NAME" \
            "apps/desktop/release/lamda-${{ github.event.inputs.version }}-mac-arm64.dmg" \
            "apps/desktop/release/lamda-${{ github.event.inputs.version }}-mac-arm64.zip" \
            --clobber
