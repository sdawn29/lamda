name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: v${{ github.event.inputs.version }}
    steps:
      - name: Validate version
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version '$VERSION' (expected semver like 0.0.2)."
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "::error::Tag v$VERSION already exists on origin."
            exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Bump versions, commit, tag, push
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          node scripts/sync-release-version.mjs --version "$VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json apps/*/package.json packages/*/package.json
          git commit -m "release: v$VERSION"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin main
          git push origin "v$VERSION"
  release:
    needs: tag
    # macos-14 is Apple Silicon — needed for arm64 native module compilation
    # (node-pty, better-sqlite3). Cross-compiling from Intel is unreliable.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - run: npm ci

      - name: Build desktop app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: node apps/desktop/build.mjs

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
        working-directory: apps/desktop/release
        run: |
          assets=($(find . -maxdepth 1 -type f))
          gh release create "$TAG" "${assets[@]}" \
            --title "$TAG" \
            --generate-notes \
            --latest \
            --verify-tag

  rollback:
    runs-on: ubuntu-latest
    needs: [tag, release]
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Delete remote tag if it exists
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            git push origin --delete "v$VERSION"
            echo "Deleted tag v$VERSION from origin."
          else
            echo "Tag v$VERSION not on origin, skipping."
          fi

      - name: Revert version bump commit if pushed
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          COMMIT=$(git log origin/main --oneline | grep " release: v$VERSION$" | head -1 | awk '{print $1}')
          if [ -n "$COMMIT" ]; then
            git revert "$COMMIT" --no-edit
            git push origin main
            echo "Reverted commit $COMMIT on main."
          else
            echo "Release commit not on origin/main, skipping."
          fi