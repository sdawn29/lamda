name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g., 0.0.2)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Update versions
        run: |
          node scripts/sync-release-version.mjs --version ${{ github.event.inputs.version }}

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json apps/*/package.json packages/*/package.json
          git commit -m "release: v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main --tags

  build:
    needs: release
    # macos-14 is Apple Silicon (arm64) — required for reliable native module
    # compilation targeting arm64 (node-pty, better-sqlite3, photon).
    # macos-13 is Intel and cross-compiling native addons to arm64 is unreliable.
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: v${{ github.event.inputs.version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build full repository
        run: npm run build

      - name: Build desktop release
        env:
          # Disable macOS code-signing on CI — remove if you configure signing secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        # --zip-only skips DMG: GitHub Actions macOS runners don't expose /dev/disk
        # devices so hdiutil (used by dmgbuild) fails with "Device not configured".
        run: node apps/desktop/build.mjs --zip-only

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "Release v$VERSION" \
            --generate-notes \
            || echo "Release may already exist"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: v${{ github.event.inputs.version }}
        run: |
          gh release upload "$TAG_NAME" \
            "apps/desktop/release/lamda-${{ github.event.inputs.version }}-mac-arm64.zip" \
            --clobber
