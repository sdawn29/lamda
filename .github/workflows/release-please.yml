name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      prs_created: ${{ steps.release.outputs.prs_created }}
      release_created: ${{ steps.release.outputs.release_created }}
      sha: ${{ steps.release.outputs.sha }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Extract release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        id: release_pr
        run: echo "branch=${{ fromJSON(steps.release.outputs.pr).headBranchName }}" >> "$GITHUB_OUTPUT"

      - name: Check out release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_pr.outputs.branch }}
          token: ${{ github.token }}

      - name: Set up Node.js
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Activate npm from packageManager
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          corepack enable
          corepack prepare npm@11.11.1 --activate

      - name: Sync workspace versions
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: npm run release:sync-version

      - name: Commit synchronized version files
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_BRANCH: ${{ steps.release_pr.outputs.branch }}
        run: |
          if git diff --quiet; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json apps/*/package.json packages/*/package.json
          git commit -m "chore: sync workspace versions"
          git push origin "HEAD:${RELEASE_BRANCH}"

  build-release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-14
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: npm
          node-version: 20

      - name: Activate npm from packageManager
        run: |
          corepack enable
          corepack prepare npm@11.11.1 --activate

      - name: Install dependencies
        run: npm ci

      - name: Build desktop release artifacts
        run: npm run build -w desktop

      - name: Upload desktop artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          gh release upload "$TAG_NAME" \
            "apps/desktop/release/lamda-${VERSION}-mac-arm64.dmg" \
            "apps/desktop/release/lamda-${VERSION}-mac-arm64.zip" \
            --clobber